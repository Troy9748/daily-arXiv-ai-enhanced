name: Backfill Zotero Recommendations

on:
  workflow_dispatch:
    inputs:
      language:
        description: '可选的语言过滤 (例如: Chinese 或 English，留空则处理所有)'
        required: false
        default: ''

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-dotenv requests
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run Backfill Script
        env:
          LANGUAGE: ${{ github.event.inputs.language }}
          # 完美绑定你截图里的 3 个 Secrets
          ZOTERO_API_KEY: ${{ secrets.ZOTERO_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          # 💡 显式声明大模型名称为 deepseek-v4-flash
          OPENAI_MODEL_NAME: "deepseek-v4-flash"
          
        run: |
          # 1. 基础粗排
          python ai/backfill_recommandations.py --data-dir data --profile data/zotero_profile.json --regenerate-md
          
          # 2. 深度精排（由 DeepSeek 强力驱动）
          python ai/generate_top100.py

      - name: Commit and Push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          if ! git diff --cached --exit-code; then
            git commit -m "chore: manual backfill and DeepSeek top 100 rerank"
            git push origin HEAD:${{ github.ref }}
          else
            echo "No changes detected. Skipping commit."
          fi
