# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: arXiv-daily-ai-enhanced

on:
  schedule:
    # arXiv announces new papers Sunday-Thursday at 20:00 New York time.
    - cron: "15 20 * * 0-4"
      timezone: "America/New_York"
  workflow_dispatch:
    inputs:
      backfill_date:
        description: 2026-06-18
        required: false
        type: string
      force_backfill:
        description: "Regenerate the selected date even if complete files already exist."
        required: true
        default: false
        type: boolean


jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Check arXiv announcement window
      id: schedule_guard
      run: |
        echo "should_run=true" >> $GITHUB_OUTPUT
        echo "Workflow accepted at $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S %Z')"

    - name: Install dependencies
      if: steps.schedule_guard.outputs.should_run == 'true'
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        uv sync
        
    - name: Crawl arXiv papers
      id: crawl_step
      if: steps.schedule_guard.outputs.should_run == 'true'
      env:
        BACKFILL_DATE: ${{ github.event.inputs.backfill_date || '' }}
        FORCE_BACKFILL: ${{ github.event.inputs.force_backfill || 'false' }}
      run: |
        source .venv/bin/activate
        language="${{ vars.LANGUAGE || 'Chinese' }}"
        if [ -n "$BACKFILL_DATE" ]; then
            if ! [[ "$BACKFILL_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
                echo "❌ backfill_date 必须是 YYYY-MM-DD 格式 / backfill_date must use YYYY-MM-DD"
                exit 1
            fi
            today="$BACKFILL_DATE"
            echo "is_backfill=true" >> $GITHUB_OUTPUT
            echo "开始一次性补跑 $today 的arXiv论文... / Starting one-off backfill for $today arXiv papers..."
        else
            today=$(date -u "+%Y-%m-%d")
            echo "is_backfill=false" >> $GITHUB_OUTPUT
            echo "开始爬取 $today 的arXiv论文... / Starting to crawl $today arXiv papers..."
        fi

        if [ "$FORCE_BACKFILL" != "true" ] && [ -s "data/${today}.jsonl" ] && [ -s "data/${today}_AI_enhanced_${language}.jsonl" ] && [ -s "data/${today}.md" ]; then
            echo "✅ 今日完整文件已存在，跳过本次运行 / Today's complete output already exists, skipping"
            echo "crawl_date=$today" >> $GITHUB_OUTPUT
            echo "already_generated=true" >> $GITHUB_OUTPUT
            exit 0
        fi
        
        echo "already_generated=false" >> $GITHUB_OUTPUT

        if [ "$FORCE_BACKFILL" = "true" ]; then
            echo "强制重新生成 ${today} / Force-regenerating ${today}"
            rm -f \
              "data/${today}.jsonl" \
              "data/${today}_AI_enhanced_${language}.jsonl" \
              "data/${today}.md" \
              "data/${today}_archive.jsonl" \
              "data/${today}_selection_report.json"
        fi

        # 检查今日原始文件是否已存在，如存在则复用 / Reuse today's raw file if it already exists
        if [ -f "data/${today}.jsonl" ]; then
            echo "📝 发现今日原始文件已存在，复用并继续后续步骤... / Found existing today's raw file, reusing it..."
        elif [ -n "$BACKFILL_DATE" ]; then
            echo "📝 历史日期原始文件不存在，使用 arXiv API 补抓... / Historical raw file missing, fetching via arXiv API..."
            export CATEGORIES="${{ vars.CATEGORIES }}"
            python scripts/fetch_arxiv_by_date.py "$today" --force
        else
            echo "📝 今日文件不存在，准备新建... / Today's file doesn't exist, ready to create new one..."
            rm -f "data/${today}_archive.jsonl" "data/${today}_selection_report.json"

            cd daily_arxiv
            export OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            export OPENAI_BASE_URL=${{ secrets.OPENAI_BASE_URL }}
            export LANGUAGE="${{ vars.LANGUAGE }}"
            export CATEGORIES="${{ vars.CATEGORIES }}"
            export MODEL_NAME="${{ vars.MODEL_NAME }}"
            export ENABLE_KEYWORD_FILTER="${{ vars.ENABLE_KEYWORD_FILTER }}"
            export ARXIV_KEYWORDS="${{ vars.ARXIV_KEYWORDS }}"

            # 使用Scrapy爬取
            # Use Scrapy to crawl
            scrapy crawl arxiv -o ../data/${today}.jsonl
            cd ..
        fi
        
        # 检查爬取是否成功 / Check if crawling was successful
        if [ ! -f "data/${today}.jsonl" ]; then
            echo "爬取失败，未生成数据文件 / Crawling failed, no data file generated"
            exit 1
        fi
        
        echo "crawl_date=$today" >> $GITHUB_OUTPUT
        echo "爬取完成 / Crawling completed"
        
    - name: Check for duplicates
      id: dedup_check
      if: steps.schedule_guard.outputs.should_run == 'true' && steps.crawl_step.outputs.already_generated != 'true'
      run: |
        source .venv/bin/activate
        if [ "${{ steps.crawl_step.outputs.is_backfill }}" = "true" ]; then
          echo "历史日期补跑跳过去重检查 / Skipping today's deduplication for historical backfill"
          echo "dedup_exit_code=0" >> $GITHUB_OUTPUT
          echo "has_new_content=true" >> $GITHUB_OUTPUT
          exit 0
        fi

        echo "执行去重检查... / Performing intelligent deduplication check..."
        
        cd daily_arxiv
        # 执行去重检查脚本 / Execute intelligent deduplication check script
        set +e  # 暂时允许命令失败 / Temporarily allow command failure
        python daily_arxiv/check_stats.py
        
        # 获取退出码 / Get exit code
        dedup_exit_code=$?
        set -e  # 恢复严格模式 / Restore strict mode
        
        echo "去重检查退出码: $dedup_exit_code / Dedup check exit code: $dedup_exit_code"
        echo "dedup_exit_code=$dedup_exit_code" >> $GITHUB_OUTPUT
        
        case $dedup_exit_code in
            0)
                echo "has_new_content=true" >> $GITHUB_OUTPUT
                ;;
            1)
                echo "has_new_content=false" >> $GITHUB_OUTPUT
                echo "skip_reason=no_new_content" >> $GITHUB_OUTPUT
                ;;
            2)
                echo "has_new_content=false" >> $GITHUB_OUTPUT
                echo "skip_reason=processing_error" >> $GITHUB_OUTPUT
                exit 1
                ;;
            *)
                echo "❌ 未知退出码，停止工作流 / Unknown exit code, stop workflow"
                echo "has_new_content=false" >> $GITHUB_OUTPUT
                echo "skip_reason=unknown_error" >> $GITHUB_OUTPUT
                exit 1
                ;;
        esac
        
    - name: Preselect Daily Recommendation Pool
      if: steps.schedule_guard.outputs.should_run == 'true' && steps.dedup_check.outputs.has_new_content == 'true'
      run: |
        source .venv/bin/activate
        today=${{ steps.crawl_step.outputs.crawl_date }}
        echo "在昂贵 AI 处理前筛选每日推荐池... / Selecting the daily pool before expensive AI work..."

        cd ai
        python prefilter.py \
          --data "../data/${today}.jsonl" \
          --archive "../data/${today}_archive.jsonl" \
          --report "../data/${today}_selection_report.json" \
          --max-papers "${{ vars.DAILY_RECOMMENDATION_LIMIT || '24' }}" \
          --min-score "${{ vars.DAILY_RECOMMENDATION_MIN_SCORE || '35' }}"

        echo "每日推荐池筛选完成 / Daily recommendation pool selected"

    - name: AI Enhancement Processing
      if: steps.schedule_guard.outputs.should_run == 'true' && steps.dedup_check.outputs.has_new_content == 'true'
      run: |
        source .venv/bin/activate
        today=${{ steps.crawl_step.outputs.crawl_date }}
        echo "开始AI增强处理... / Starting AI enhancement processing..."
        
        cd ai
        export OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
        export OPENAI_BASE_URL=${{ secrets.OPENAI_BASE_URL }}
        export LANGUAGE="${{ vars.LANGUAGE }}"
        export MODEL_NAME="${{ vars.MODEL_NAME }}"
        
        python enhance.py --data ../data/${today}.jsonl
        
        # 检查AI处理是否成功 / Check if AI processing was successful
        if [ $? -ne 0 ]; then
            echo "AI处理失败 / AI processing failed"
            exit 1
        fi
        echo "AI增强处理完成 / AI enhancement processing completed"

    - name: Zotero Personalized Recommendation
      if: steps.schedule_guard.outputs.should_run == 'true' && steps.dedup_check.outputs.has_new_content == 'true'
      run: |
        source .venv/bin/activate
        today=${{ steps.crawl_step.outputs.crawl_date }}
        echo "开始 Zotero 个性化推荐评分... / Starting Zotero personalized recommendation..."

        cd ai
        export ZOTERO_EMAIL="${{ vars.ZOTERO_EMAIL }}"
        export ZOTERO_USER_ID="${{ vars.ZOTERO_USER_ID }}"
        export ZOTERO_LIBRARY_TYPE="${{ vars.ZOTERO_LIBRARY_TYPE }}"
        export ZOTERO_LIBRARY_ID="${{ vars.ZOTERO_LIBRARY_ID }}"
        export ZOTERO_COLLECTION_KEY="${{ vars.ZOTERO_COLLECTION_KEY }}"
        export ZOTERO_MAX_ITEMS="${{ vars.ZOTERO_MAX_ITEMS }}"
        export ZOTERO_API_KEY="${{ secrets.ZOTERO_API_KEY }}"
        export ZOTERO_FALLBACK_KEYWORDS="${{ vars.ZOTERO_FALLBACK_KEYWORDS }}"
        export OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}"
        export OPENAI_BASE_URL="${{ secrets.OPENAI_BASE_URL }}"
        export MODEL_NAME="${{ vars.MODEL_NAME }}"
        export ENABLE_LLM_RECOMMENDATION="${{ vars.ENABLE_LLM_RECOMMENDATION }}"

        AI_FILE="../data/${today}_AI_enhanced_${{ vars.LANGUAGE }}.jsonl"
        python recommend.py --data "$AI_FILE"

        if [ $? -ne 0 ]; then
            echo "Zotero 推荐评分失败 / Zotero recommendation failed"
            exit 1
        fi
        echo "Zotero 个性化推荐评分完成 / Zotero personalized recommendation completed"

    - name: Paper Detail Artifacts
      if: steps.schedule_guard.outputs.should_run == 'true' && steps.dedup_check.outputs.has_new_content == 'true'
      run: |
        source .venv/bin/activate
        today=${{ steps.crawl_step.outputs.crawl_date }}
        echo "开始生成摘要翻译、结论翻译和重点图片信息... / Starting paper detail artifact generation..."

        cd ai
        export OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}"
        export OPENAI_BASE_URL="${{ secrets.OPENAI_BASE_URL }}"
        export MODEL_NAME="${{ vars.MODEL_NAME }}"
        export ENABLE_PAPER_ARTIFACTS="${{ vars.ENABLE_PAPER_ARTIFACTS }}"

        AI_FILE="../data/${today}_AI_enhanced_${{ vars.LANGUAGE }}.jsonl"
        python artifacts.py --data "$AI_FILE"

        if [ $? -ne 0 ]; then
            echo "论文详情增强失败 / Paper detail artifact generation failed"
            exit 1
        fi
        echo "论文详情增强完成 / Paper detail artifact generation completed"
        
    - name: Convert to Markdown
      if: steps.schedule_guard.outputs.should_run == 'true' && steps.dedup_check.outputs.has_new_content == 'true'
      run: |
        source .venv/bin/activate
        today=${{ steps.crawl_step.outputs.crawl_date }}
        echo "转换为Markdown格式... / Converting to Markdown format..."
        
        # 设置环境变量 / Set environment variables
        export LANGUAGE="${{ vars.LANGUAGE }}"
        
        cd to_md
        
        # 使用AI增强文件进行转换 / Use AI enhanced file for conversion
        AI_FILE="../data/${today}_AI_enhanced_${LANGUAGE}.jsonl"
        
        if [ -f "$AI_FILE" ]; then
            echo "使用AI增强文件进行转换... / Using AI enhanced file for conversion..."
            python convert.py --data "$AI_FILE"
        else
            echo "错误：未找到AI增强文件 / Error: AI enhanced file not found"
            echo "AI文件: $AI_FILE"
            exit 1
        fi
        
        # 检查转换是否成功 / Check if conversion was successful
        if [ $? -ne 0 ]; then
            echo "Markdown转换失败 / Markdown conversion failed"
            exit 1
        fi
        echo "Markdown转换完成 / Markdown conversion completed"

    - name: Backfill Historical Recommendation and Artifacts
      if: steps.schedule_guard.outputs.should_run == 'true' && steps.crawl_step.outputs.already_generated != 'true' && steps.crawl_step.outputs.is_backfill != 'true'
      run: |
        source .venv/bin/activate
        echo "检查历史文件格式并补齐旧推荐/详情字段... / Backfilling outdated historical schemas..."

        today=${{ steps.crawl_step.outputs.crawl_date }}
        export LANGUAGE="${{ vars.LANGUAGE }}"
        export ZOTERO_EMAIL="${{ vars.ZOTERO_EMAIL }}"
        export ZOTERO_USER_ID="${{ vars.ZOTERO_USER_ID }}"
        export ZOTERO_LIBRARY_TYPE="${{ vars.ZOTERO_LIBRARY_TYPE }}"
        export ZOTERO_LIBRARY_ID="${{ vars.ZOTERO_LIBRARY_ID }}"
        export ZOTERO_COLLECTION_KEY="${{ vars.ZOTERO_COLLECTION_KEY }}"
        export ZOTERO_MAX_ITEMS="${{ vars.ZOTERO_MAX_ITEMS }}"
        export ZOTERO_API_KEY="${{ secrets.ZOTERO_API_KEY }}"
        export ZOTERO_FALLBACK_KEYWORDS="${{ vars.ZOTERO_FALLBACK_KEYWORDS }}"
        export OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}"
        export OPENAI_BASE_URL="${{ secrets.OPENAI_BASE_URL }}"
        export MODEL_NAME="${{ vars.MODEL_NAME }}"
        export ENABLE_LLM_RECOMMENDATION="${{ vars.ENABLE_LLM_RECOMMENDATION }}"
        export ENABLE_PAPER_ARTIFACTS="${{ vars.ENABLE_PAPER_ARTIFACTS }}"
        export CURRENT_DAILY_FILE="${today}_AI_enhanced_${LANGUAGE}.jsonl"

        python ai/backfill_schema.py \
          --language "${LANGUAGE}" \
          --max-files "${{ vars.BACKFILL_MAX_FILES || '20' }}" \
          --max-papers -1 \
          --min-score "${{ vars.DAILY_RECOMMENDATION_MIN_SCORE || '35' }}" \
          --current-file "${CURRENT_DAILY_FILE}"

    - name: Generate Historical Top Lists
      if: steps.schedule_guard.outputs.should_run == 'true' && steps.crawl_step.outputs.already_generated != 'true'
      run: |
        source .venv/bin/activate
        echo "生成最近一年/月/周高推荐榜单... / Generating recent year/month/week top recommendation lists..."

        export LANGUAGE="${{ vars.LANGUAGE }}"

        python ai/generate_top100.py

        if [ $? -ne 0 ]; then
            echo "历史高推荐榜单生成失败 / Historical top list generation failed"
            exit 1
        fi
        echo "历史高推荐榜单生成完成 / Historical top list generation completed"
        
    - name: Update file list
      if: steps.schedule_guard.outputs.should_run == 'true' && steps.crawl_step.outputs.already_generated != 'true'
      run: |
        echo "更新文件列表... / Updating file list..."
        find data -maxdepth 1 -name '*.jsonl' ! -name '*_archive.jsonl' -print | sed 's|data/||' | sort > assets/file-list.txt
        echo "文件列表更新完成 / File list updated"

    - name: Generate Research Statistics and Weekly Digest
      if: steps.schedule_guard.outputs.should_run == 'true' && steps.crawl_step.outputs.already_generated != 'true'
      run: |
        source .venv/bin/activate
        python ai/generate_statistics.py
        echo "年度/全库统计与周报已生成 / Statistics and weekly digest generated"

    - name: Generate password hash and inject into config
      if: steps.schedule_guard.outputs.should_run == 'true' && steps.crawl_step.outputs.already_generated != 'true'
      run: |
        echo "🔐 Generating password hash for authentication..."

        PASSWORD="${{ secrets.ACCESS_PASSWORD }}"

        if [ -z "$PASSWORD" ]; then
          echo "⚠️  WARNING: ACCESS_PASSWORD not set in Secrets"
          echo "⚠️  Password protection will be DISABLED"
          echo "⚠️  To enable password protection, add ACCESS_PASSWORD in repository Secrets"
          echo "ℹ️  Website will remain publicly accessible without authentication"

          # Use a special value that will disable authentication
          PASSWORD_HASH="DISABLED_NO_PASSWORD_SET_IN_SECRETS"
        else
          # Generate SHA-256 hash using openssl
          PASSWORD_HASH=$(echo -n "$PASSWORD" | openssl dgst -sha256 -hex | awk '{print $2}')
          echo "✅ Password hash generated successfully"
          echo "✅ Hash length: ${#PASSWORD_HASH} characters"
          echo "🔐 Password protection is ENABLED"
        fi

        # Inject hash into auth-config.js
        if [ -f "js/auth-config.js" ]; then
          sed -i "s/PLACEHOLDER_PASSWORD_HASH/$PASSWORD_HASH/" js/auth-config.js
          echo "✅ Password hash injected into js/auth-config.js"
        else
          echo "❌ ERROR: js/auth-config.js not found!"
          exit 1
        fi

        echo "🔐 Authentication setup complete"

    - name: Summary
      if: steps.schedule_guard.outputs.should_run == 'true'
      run: |
        if [ "${{ steps.crawl_step.outputs.already_generated }}" = "true" ]; then
          echo "ℹ️ 工作流跳过：今日完整文件已存在 / Workflow skipped: today's complete output already exists"
        elif [ "${{ steps.crawl_step.outputs.is_backfill }}" = "true" ]; then
          echo "✅ 历史日期补跑完成：${{ steps.crawl_step.outputs.crawl_date }} / Historical backfill completed"
        elif [ "${{ steps.dedup_check.outputs.has_new_content }}" = "true" ]; then
          echo "✅ 工作流完成：去重发现新内容并成功处理 / Workflow completed: Smart deduplication found new content and processed successfully"
        else
          case "${{ steps.dedup_check.outputs.skip_reason }}" in
            "no_new_content")
              echo "ℹ️ 工作流完成：去重后无新内容 / Workflow completed: No new content after smart deduplication"
              ;;
            "processing_error")
              echo "⚠️ 工作流完成：去重处理出错 / Workflow completed: Deduplication processing error"
              ;;
            "unknown_error")
              echo "⚠️ 工作流完成：未知错误 / Workflow completed: Unknown error"
              ;;
            *)
              echo "ℹ️ 工作流完成：未知原因跳过处理 / Workflow completed: Skipped for unknown reason"
              ;;
          esac
        fi
        
    - name: Commit changes
      if: steps.schedule_guard.outputs.should_run == 'true' && steps.crawl_step.outputs.already_generated != 'true'
      run: |
        git config --global user.email "${{ vars.EMAIL }}"
        git config --global user.name "${{ vars.NAME }}"
        git add .
        # 检查是否有变更需要提交 / Check if there are changes to commit
        if git diff --staged --quiet; then
          echo "没有变更需要提交 / No changes to commit"
          exit 0
        fi
        git commit -m "update: $(date -u '+%Y-%m-%d') arXiv papers"
        if [ "${{ steps.crawl_step.outputs.is_backfill }}" = "true" ]; then
          git commit --amend -m "backfill: ${{ steps.crawl_step.outputs.crawl_date }} arXiv papers"
        fi
        echo "变更已提交 / Changes committed"
        
    - name: Pull latest changes and push
      if: steps.schedule_guard.outputs.should_run == 'true' && steps.crawl_step.outputs.already_generated != 'true'
      run: |
        # 设置Git配置以处理自动合并 / Set Git config for automatic merging
        git config pull.rebase true
        git config rebase.autoStash true
        
        # 尝试推送，如果失败则拉取并重试 / Try to push, if failed then pull and retry
        for i in {1..3}; do
          echo "推送尝试 $i / Push attempt $i"
          if git push origin main; then
            echo "推送成功 / Push successful"
            break
          else
            echo "推送失败，拉取最新变更... / Push failed, pulling latest changes..."
            git pull origin main --no-edit || true
            if [ $i -eq 3 ]; then
              echo "3次尝试后推送失败 / Failed to push after 3 attempts"
              exit 1
            fi
          fi
        done
