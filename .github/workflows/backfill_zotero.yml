name: Backfill Zotero Recommendations


on:
  workflow_dispatch:
    inputs:
      language:
        description: '可选的语言过滤 (例如: Chinese 或 English，留空则处理所有)'
        required: false
        default: ''

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 赋予工作流向仓库推送代码的权限

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 如果有 requirements.txt 可以开启缓存加速

      - name: Install dependencies
        run: |
          pip install python-dotenv
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "requirements.txt not found, skipping installation."
          fi

      - name: Run Backfill Script
        env:
          LANGUAGE: ${{ github.event.inputs.language }}
        run: |
          # 显式传入 --regenerate-md 确保重新生成 Markdown 文件
          python ai/backfill_recommandations.py --regenerate-md

      - name: Commit and Push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          # 暂存所有被修改的 jsonl 和 md 文件
          git add .
          
          # 检查是否有内容变更，避免无意义的空提交导致工作流报错
          if ! git diff --cached --exit-code; then
            git commit -m "chore: manual backfill Zotero recommendations and regenerate md"
            git push origin HEAD:${{ github.ref }}
          else
            echo "No changes detected. Skipping commit."
          fi
